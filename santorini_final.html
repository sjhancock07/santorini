<style>

  --pg:#F0E8D0;--card:#FAF6E8;

.row{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;}
.rl{font-size:11px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;}
.grp{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.btn{padding:7px 16px;font-size:12px;font-family:'Cinzel',Georgia,serif;letter-spacing:.02em;border:2px solid var(--btn-bdr);border-radius:6px;background:var(--btn-bg);color:var(--btn-txt);cursor:pointer;transition:background .12s;}

.tgl{width:36px;height:20px;border-radius:10px;border:2px solid var(--btn-bdr);background:var(--btn-bg);cursor:pointer;position:relative;display:inline-block;flex-shrink:0;}

.lvs{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column-reverse;align-items:center;pointer-events:none;}

.l2::after{content:'';position:absolute;bottom:0;left:0;right:0;height:5px;background:var(--l2cb);}
.l3{width:44px;height:12px;background:var(--l3c);border-radius:2px 2px 0 0;margin-bottom:1px;border-top:3px solid var(--l3t);border-left:1px solid #D8D0C0;border-right:1px solid #D8D0C0;}
.dm{width:36px;height:18px;border-radius:18px 18px 3px 3px;background:var(--dmc);margin-bottom:2px;border-top:3px solid var(--dmt);position:relative;}
.dm::after{content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);width:12px;height:5px;border-radius:6px;background:rgba(255,255,255,.22);}
.lvn{position:absolute;top:3px;right:4px;font-size:10px;color:var(--text2);pointer-events:none;font-family:'Cinzel',Georgia,serif;}
.wf{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;}
#tt{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.pip2{padding:4px 12px;font-size:11px;letter-spacing:.03em;border-radius:20px;border:1.5px solid var(--bdr);color:var(--text2);background:var(--card);position:relative;cursor:default;}
.pip2.cur{font-weight:600;border-width:2px;}
.pip2:hover .tip{display:block;}
.tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1.5px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);width:210px;white-space:normal;z-index:100;pointer-events:none;line-height:1.5;font-family:sans-serif;box-shadow:0 3px 10px rgba(0,0,0,.12);}
.tip strong{font-family:'Cinzel',Georgia,serif;color:var(--gold);font-size:12px;display:block;margin-bottom:3px;}
#actbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
#abilbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.aib{font-size:11px;font-family:'Cinzel',Georgia,serif;padding:3px 10px;border-radius:12px;border:1.5px solid;position:relative;cursor:default;letter-spacing:.02em;}
.aib:hover .tip{display:block;}
#legend{display:flex;gap:10px;font-size:11px;color:var(--text2);align-items:center;flex-wrap:wrap;justify-content:center;font-family:sans-serif;}
.li{display:flex;align-items:center;gap:4px;}
.lb{width:12px;height:12px;border-radius:2px;}
.divider{text-align:center;color:var(--gold);letter-spacing:10px;font-size:13px;margin:2px 0;}
.rules-box{width:100%;display:flex;flex-direction:column;gap:12px;max-height:370px;overflow-y:auto;padding-right:4px;}
.rules-section{display:flex;flex-direction:column;gap:4px;}
.rules-section p,.rules-section li{font-size:13px;color:var(--text2);line-height:1.6;font-family:sans-serif;}
.rules-section ul{padding-left:16px;display:flex;flex-direction:column;gap:3px;}

function initFB(){

function genCode(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var s='';for(var i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];
  return s;
}

/* ===== GAME VARS ===== */
var SZ=5;
var CLR=[{fill:'#185FA5'},{fill:'#8B3A2A'},{fill:'#276749'},{fill:'#6B3070'}];
var NAMES=['Player 1','Player 2','Player 3','Player 4'];
var ABS=[
  {id:'none',name:'None',desc:'No special power.'},
  {id:'apollo',name:'Apollo',desc:'Move into an opponent\'s space by swapping positions (level rules still apply).'},
  {id:'artemis',name:'Artemis',desc:'After moving, may move one additional time \u2014 but not back to your starting space.'},
  {id:'atlas',name:'Atlas',desc:'Toggle Dome/Normal during build to place a dome at any level.'},
  {id:'demeter',name:'Demeter',desc:'After building, may build one additional time on a different adjacent space.'},
  {id:'hephaestus',name:'Hephaestus',desc:'After building a block, may add one more block to the same space (no dome).'},
  {id:'pan',name:'Pan',desc:'Also win if your worker moves down 2 or more levels on your turn.'},
  {id:'hermes',name:'Hermes',desc:'If you stay flat (no elevation change), you may move any number of times before building.'},
  {id:'triton',name:'Triton',desc:'Each time your worker moves to a perimeter (edge) space, you may move again.'},
  {id:'zeus',name:'Zeus',desc:'During your build, you may build under your own worker, raising your level by 1 (max level 3).'},
  {id:'ares',name:'Ares',desc:'After building, you may remove one block (not a dome) from an adjacent unoccupied space.'},
  {id:'chronus',name:'Chronus',desc:'You also win when 5 complete towers (topped with domes) exist on the board.'},
  {id:'hera',name:'Hera',desc:'Opponents cannot win by moving onto a corner space of the board.'},
];
var ABS_REAL=ABS.slice(1);
var draggedAbilId=null;
var hC=1,cC=1,diff='medium',useAbs=false;
var players=[],useTeams=false;
var grid,turnIdx,phase,gameOver;
var draftOrder,draftStep;
var selWI,hlMv,hlBd,atlasDome,artStart,demFirst,hermesFlat;
var STACK_H=[0,13,35,48];

/* ===== ONLINE STATE ===== */
/* Phase flow:
   LOBBY  = code shared, guest connected, host configuring
   GAME   = game running
*/
var onlineMode=false,isHost=false,gameCode='';
var myPlayerIndices=[]; // indices into players[] that this client controls
var lobbyRef=null,stateRef=null;
var lastPushId=null;
var gameUIBuilt=false;

function G(id){return document.getElementById(id);}
function root(){return G('root');}

/* ===== SERIALIZATION ===== */
/* Serialization uses only flat objects and plain numbers - no nested arrays.
   Firebase mangles JS arrays, so we avoid them entirely in the wire format. */

function serP(){
  var out={n:players.length};
  players.forEach(function(p,i){
    out['p'+i]={nm:p.name,fl:p.color.fill,tm:p.team,ab:p.ability,hu:p.isHuman?1:0};
    p.workers.forEach(function(w,wi){
      out['p'+i]['wr'+wi]=(w.pos?w.pos[0]*10+w.pos[1]:-1); // encode [r,c] as r*10+c, -1=unplaced
    });
    out['p'+i].wc=p.workers.length;
  });
  return out;
}
function desP(sp){
  players=[];
  for(var i=0;i<sp.n;i++){
    var pd=sp['p'+i];
    var clr=CLR.find(function(c){return c.fill===pd.fl;})||CLR[0];
    var workers=[];
    for(var wi=0;wi<pd.wc;wi++){
      var enc=pd['wr'+wi];
      workers.push({pos:enc>=0?[Math.floor(enc/10),enc%10]:null});
    }
    players.push({name:pd.nm,color:clr,team:pd.tm,ability:pd.ab,isHuman:!!pd.hu,workers:workers});
  }
}
function serG(){
  var g={};
  for(var r=0;r<SZ;r++){
    for(var c=0;c<SZ;c++){
      var cell=grid[r][c];
      var k='c'+r+'x'+c;
      g[k]={lv:cell.level,dm:cell.dome?1:0,wp:cell.worker?players.indexOf(cell.worker.p):-1,ww:cell.worker?cell.worker.wi:-1};
    }
  }
  return g;
}
function desG(g){
  grid=[];
  for(var r=0;r<SZ;r++){
    grid[r]=[];
    for(var c=0;c<SZ;c++){
      var cell=g['c'+r+'x'+c];
      grid[r][c]={level:cell.lv,dome:!!cell.dm,worker:cell.wp>=0?{p:players[cell.wp],wi:cell.ww}:null};
    }
  }
}
function encPairs(arr){
  // encode [[r,c],[r,c],...] as a plain object {n:len, v0:r*10+c, v1:...}
  if(!arr||!arr.length)return {n:0};
  var o={n:arr.length};
  arr.forEach(function(pair,i){o['v'+i]=pair[0]*10+pair[1];});
  return o;
}
function decPairs(o){
  if(!o||!o.n)return [];
  var arr=[];
  for(var i=0;i<o.n;i++)arr.push([Math.floor(o['v'+i]/10),o['v'+i]%10]);
  return arr;
}
function encPair(pair){return pair?pair[0]*100+pair[1]:-1;}
function decPair(v){return v>=0?[Math.floor(v/100),v%100]:null;}
function encArr(arr){
  // encode a flat int array as {n:len,v0:...,v1:...}
  if(!arr||!arr.length)return {n:0};
  var o={n:arr.length};
  arr.forEach(function(v,i){o['v'+i]=v;});
  return o;
}
function decArr(o){
  if(!o||!o.n)return [];
  var arr=[];
  for(var i=0;i<o.n;i++)arr.push(o['v'+i]);
  return arr;
}

/* Push full game state to Firebase. Only the active player calls this. */
function pushState(){var pid=Math.random().toString(36).slice(2)+Date.now().toString(36);lastPushId=pid;
  if(!onlineMode||!db)return;

  var s={
    pushId:pid,ts:Date.now(),
    useAbs:useAbs?1:0,useTeams:useTeams?1:0,
    players:serP(),grid:serG(),
    turnIdx:turnIdx,phase:phase,gameOver:gameOver?1:0,
    draftStep:draftStep,draftOrder:encArr(draftOrder),
    selWI:selWI===null?-1:selWI,
    hlMv:encPairs(hlMv),hlBd:encPairs(hlBd),
    atlasDome:atlasDome?1:0,
    artStart:encPair(artStart),demFirst:encPair(demFirst),hermesFlat:hermesFlat?1:0
  };
  stateRef.set(s);
}

/* Apply incoming Firebase state. Called by BOTH host and guest when they receive a state
   that was pushed by the OTHER player (or initial state from host). */
function onRemoteState(s){
  if(!s)return;
  // Skip if this is our own push echoed back
  if(s.pushId&&s.pushId===lastPushId)return;

  if(!s.players||!s.grid)return;
  useAbs=!!s.useAbs;useTeams=!!s.useTeams;
  desP(s.players);desG(s.grid);
  turnIdx=s.turnIdx;phase=s.phase;gameOver=!!s.gameOver;
  draftStep=s.draftStep;draftOrder=decArr(s.draftOrder);
  selWI=s.selWI===-1?null:s.selWI;
  hlMv=decPairs(s.hlMv);hlBd=decPairs(s.hlBd);
  atlasDome=!!s.atlasDome;
  artStart=decPair(s.artStart);demFirst=decPair(s.demFirst);hermesFlat=!!s.hermesFlat;

  if(!gameUIBuilt){computeMyIndices();buildUI();gameUIBuilt=true;}
  renderAll();

  // If it's a CPU turn, only the host runs it
  if(isHost&&!gameOver){
    var cp=players[turnIdx];
    if(!cp.isHuman){
      if(phase==='place')setTimeout(cpuPlace,600);
      else if(phase==='sel')setTimeout(cpuTurn,600);
    }
  }
}

/* ===== TURN ASSIGNMENT ===== */
/* Host controls human players at even indices (0,2); guest controls odd (1,3) */
function computeMyIndices(){
  /* Called after players[] is finalised (launch or first onRemoteState).
     Host controls even-indexed human players (0,2,...),
     Guest controls odd-indexed human players (1,3,...). */
  myPlayerIndices=[];
  var humanCount=0;
  players.forEach(function(p,i){
    if(!p.isHuman)return;
    if(isHost && humanCount%2===0) myPlayerIndices.push(i);
    if(!isHost && humanCount%2===1) myPlayerIndices.push(i);
    humanCount++;
  });
}
function isMyTurn(){
  if(!players||!players[turnIdx])return false;
  if(!players[turnIdx].isHuman)return false;
  if(!onlineMode)return true;
  return myPlayerIndices.indexOf(turnIdx)>=0;
}

/* ===== RULES PAGE ===== */
function showRules(){
  root().innerHTML='<div class="sc" style="width:460px;max-width:98vw;"><h2>How to Play</h2><div class="divider">&#9670; &#9670; &#9670;</div>'
    +'<div class="rules-box">'
    +'<div class="rules-section"><h3>Goal</h3><p>Win by <strong>moving up onto a level-3 tower</strong>. You must come from a lower level \u2014 already standing on level 3 does not count.</p></div>'
    +'<div class="rules-section"><h3>Setup</h3><ul><li>Players place workers one at a time in snake-draft order.</li><li>2-player: 2 workers each. 3 or 4-player: 1 worker each.</li></ul></div>'
    +'<div class="rules-section"><h3>On Your Turn</h3><ul>'
    +'<li><strong>Move:</strong> Move to any adjacent space. Climb at most 1 level, stay flat, or drop freely. No domed or occupied spaces.</li>'
    +'<li><strong>Build:</strong> Add a block to any adjacent empty undomed space. 3 blocks then a dome.</li></ul></div>'
    +'<div class="rules-section"><h3>Domes</h3><p>Building on level 3 adds a dome \u2014 no one can enter or build there.</p></div>'

/* ===== ONLINE: GUEST JOIN ===== */
function joinGame(){
  var inp=G('join-inp');var errEl=G('join-err');
  var code=(inp?inp.value:'').trim().toUpperCase();
  if(code.length!==4){if(errEl)errEl.textContent='Enter a 4-letter code.';return;}
  if(!initFB()){if(errEl)errEl.textContent='Connection failed.';return;}
  if(errEl)errEl.textContent='';
  // Verify lobby exists
  db.ref('games/'+code+'/lobby').once('value',function(snap){
    if(!snap.val()){if(errEl)errEl.textContent='Game not found. Check the code.';return;}
    onlineMode=true;isHost=false;gameCode=code;gameUIBuilt=false;lastPushId=null;
    // Signal presence
    db.ref('games/'+code+'/guest').set({joined:Date.now()});
    stateRef=db.ref('games/'+code+'/state');
    // Listen for game state pushed by host
    stateRef.on('value',function(snap){onRemoteState(snap.val());});
    // Show waiting screen
    root().innerHTML='<div class="sc"><h2>Game '+code+'</h2><div class="divider">&#9670; &#9670; &#9670;</div>'
      +'<div class="note" style="font-family:sans-serif">Connected! Waiting for host to configure and start...</div>'
      +'<div class="note" style="font-family:sans-serif;margin-top:6px">Code: <strong style="color:var(--gold);font-size:15px;letter-spacing:.1em">'+code+'</strong></div>'

function goNext(){var total=hC+cC;if(total<2||total>4)return;mkPlayers();if(total===4)showTeams(false);else if(useAbs)showAbil(false);else launch();}

function doverAbil(pi){var e=G('pr-'+pi);if(e)e.classList.add('dov');}

/* ===== LAUNCH ===== */
function launch(){
  players.forEach(function(p){
    if(!useAbs){p.ability='none';}
    else{if(p.ability==='__random__')p.ability=ABS_REAL[Math.floor(Math.random()*ABS_REAL.length)].id;if(!p.ability)p.ability='none';}
  });
  grid=[];
  for(var r=0;r<SZ;r++){grid[r]=[];for(var c=0;c<SZ;c++)grid[r][c]={level:0,dome:false,worker:null};}
  draftOrder=players.length===2?[0,1,1,0]:players.map(function(_,i){return i;});
  draftStep=0;turnIdx=draftOrder[0];phase='place';gameOver=false;
  selWI=null;hlMv=[];hlBd=[];atlasDome=false;artStart=null;demFirst=null;hermesFlat=false;
  computeMyIndices();
  gameUIBuilt=true;
  buildUI();renderAll();

  if(onlineMode&&isHost){
    // Push initial state so guest receives it, then listen for guest moves
    pushState();
    stateRef.on('value',function(snap){onRemoteState(snap.val());});
  }
  // Local or CPU first turn
  if(!onlineMode&&!players[turnIdx].isHuman)setTimeout(cpuPlace,500);
  if(onlineMode&&isHost&&!players[turnIdx].isHuman)setTimeout(cpuPlace,500);
}

/* ===== GAME LOGIC ===== */
function nb(r,c){var res=[];for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;var nr=r+dr,nc=c+dc;if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ)res.push([nr,nc]);}return res;}
function isAdj(r1,c1,r2,c2){return Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1&&!(r1===r2&&c1===c2);}
function isPerimeter(r,c){return r===0||r===SZ-1||c===0||c===SZ-1;}
function isCorner(r,c){return (r===0||r===SZ-1)&&(c===0||c===SZ-1);}
function countDomes(){var n=0;for(var r=0;r<SZ;r++)for(var c=0;c<SZ;c++)if(grid[r][c].dome)n++;return n;}
function canMv(p,fr,fc,tr,tc){
  if(!isAdj(fr,fc,tr,tc))return false;var t=grid[tr][tc],fl=grid[fr][fc].level;
  if(t.dome)return false;if(t.level>fl+1)return false;
  if(t.worker){if(p.ability==='apollo'&&t.worker.p!==p)return true;return false;}return true;
}
function getMvs(p,r,c){return nb(r,c).filter(function(n){return canMv(p,r,c,n[0],n[1]);});}
function canBd(fr,fc,tr,tc){if(!isAdj(fr,fc,tr,tc))return false;var t=grid[tr][tc];return !t.worker&&!t.dome;}
function getBds(p,r,c,excl){
  var res=nb(r,c).filter(function(n){if(excl&&n[0]===excl[0]&&n[1]===excl[1])return false;return canBd(r,c,n[0],n[1]);});
  if(p.ability==='zeus'&&grid[r][c].level<3&&!grid[r][c].dome)res.push([r,c]);
  return res;
}
function checkWin(p,fr,fc,tr,tc){
  var fl=grid[fr][fc].level,tl=grid[tr][tc].level;
  if(tl===3&&fl<3){if(useAbs){var ha=players.some(function(q){return q!==p&&q.ability==='hera';});if(ha&&isCorner(tr,tc))return false;}return true;}
  if(useAbs&&p.ability==='pan'&&fl-tl>=2)return true;
  return false;
}
function checkChronus(p){return useAbs&&p.ability==='chronus'&&countDomes()>=5;}
function doMv(p,wi,fr,fc,tr,tc){
  if(p.ability==='apollo'&&grid[tr][tc].worker){var opp=grid[tr][tc].worker;opp.p.workers[opp.wi].pos=[fr,fc];grid[fr][fc].worker=opp;}
  else{grid[fr][fc].worker=null;}
  grid[tr][tc].worker={p:p,wi:wi};p.workers[wi].pos=[tr,tc];
}
function doBd(r,c){var cell=grid[r][c];if(atlasDome){cell.dome=true;}else if(cell.level<3){cell.level++;}else{cell.dome=true;}}
function setSt(msg){var e=G('sb');if(e)e.textContent=msg;}
function renderAll(){rTT();rBoard();rActBar();rAbilBar();if(!gameOver)uSt();}
function rTT(){
  var e=G('tt');if(!e)return;
  e.innerHTML=players.map(function(p,i){
    var ts=useTeams?' \u2022 T'+(p.team===0?'I':'II'):'';
    var active=i===turnIdx;
    var ab=useAbs?ABS.find(function(a){return a.id===p.ability;}):null;
    var tipHtml=ab&&ab.id!=='none'?'<div class="tip"><strong>'+ab.name+'</strong>'+ab.desc+'</div>':'';
    return '<div class="pip2'+(active?' cur':'')+'" style="'+(active?'border-color:'+p.color.fill+';color:'+p.color.fill:'')+'">'
      +p.name+ts+tipHtml+'</div>';
  }).join('');
}
function rBoard(){
  var bd=G('board');if(!bd)return;bd.innerHTML='';
  var cp=players[turnIdx];
  for(var r=0;r<SZ;r++){
    for(var c=0;c<SZ;c++){
      var cell=grid[r][c],div=document.createElement('div');div.className='cell';
      if(hlMv.some(function(h){return h[0]===r&&h[1]===c;}))div.classList.add('mv');
      else if(phase==='removebld'&&hlBd.some(function(h){return h[0]===r&&h[1]===c;}))div.classList.add('rm');
      else if(hlBd.some(function(h){return h[0]===r&&h[1]===c;}))div.classList.add('bl');
      if(phase==='sel'&&isMyTurn())cp.workers.forEach(function(w){if(w.pos&&w.pos[0]===r&&w.pos[1]===c)div.classList.add('sw');});
      (function(rr,cc){div.onclick=function(){click(rr,cc);};})(r,c);
      if(cell.level>0||cell.dome){
        var st=document.createElement('div');st.className='lvs';
        for(var i=1;i<=cell.level&&i<=3;i++){var b=document.createElement('div');b.className='l'+i;st.appendChild(b);}
        if(cell.dome){var d=document.createElement('div');d.className='dm';st.appendChild(d);}
        div.appendChild(st);
        if(!cell.dome&&cell.level>0){var n=document.createElement('div');n.className='lvn';n.textContent=cell.level;div.appendChild(n);}
      }
      if(cell.worker){
        var fig=document.createElement('div');fig.className='wf';
        var lbl=players.length===2?(cell.worker.wi===0?'A':'B'):'';
        fig.innerHTML=wSVG(cell.worker.p.color,lbl);
        fig.style.bottom=(STACK_H[cell.level]+3)+'px';
        div.appendChild(fig);
      }
      bd.appendChild(div);
    }
  }
}
function rActBar(){
  var e=G('actbar');if(!e)return;var cp=players[turnIdx];e.innerHTML='';
  if(gameOver){var b=document.createElement('button');b.className='btn';b.textContent='New Game';b.onclick=showSetup;e.appendChild(b);return;}
  if(!isMyTurn())return;
  if(phase==='build'&&cp.ability==='atlas'){
    var ab=document.createElement('button');ab.className='btn'+(atlasDome?' on':'');
    ab.textContent='Build: '+(atlasDome?'Dome':'Normal');
    ab.onclick=function(){atlasDome=!atlasDome;rActBar();uSt();};e.appendChild(ab);
  }
  if(phase==='extramove'){var sm=document.createElement('button');sm.className='btn';sm.textContent='Skip Extra Move';sm.onclick=skipExtraMove;e.appendChild(sm);}
  if(phase==='extrabuild'){var sb2=document.createElement('button');sb2.className='btn';sb2.textContent='Skip Extra Build';sb2.onclick=function(){hlBd=[];finishTurn();};e.appendChild(sb2);}
  if(phase==='removebld'){var sr=document.createElement('button');sr.className='btn';sr.textContent='Skip Remove';sr.onclick=function(){hlBd=[];finishTurn();};e.appendChild(sr);}
}
function rAbilBar(){
  if(!useAbs)return;var e=G('abilbar');if(!e)return;
  e.innerHTML=players.map(function(p){
    var ab=ABS.find(function(a){return a.id===p.ability;});
    if(!ab||ab.id==='none')return '';
    return '<div class="aib" style="border-color:'+p.color.fill+';color:'+p.color.fill+'">'
      +p.name+': '+ab.name+'<div class="tip"><strong>'+ab.name+'</strong>'+ab.desc+'</div></div>';
  }).join('');
}
function uSt(){
  var cp=players[turnIdx];
  var ab=useAbs?ABS.find(function(a){return a.id===cp.ability;}):null;
  var an=ab&&ab.id!=='none'?' ['+ab.name+']':'';
  var wn=players.length===2?' '+(cp.workers.filter(function(w){return w.pos;}).length+1)+' of 2':'';
  var waiting=onlineMode&&!isMyTurn()&&cp.isHuman;
  var pre=waiting?'(Waiting for '+cp.name+') ':'';
  var m={
    place:pre+cp.name+' \u2014 Place Worker'+wn,
    sel:pre+cp.name+an+' \u2014 Choose a Worker',
    move:pre+cp.name+an+' \u2014 Move to Highlighted Space',
    extramove:pre+cp.name+an+' \u2014 Move Again, or Skip',
    build:pre+cp.name+an+' \u2014 Build'+(cp.ability==='atlas'?' (Toggle Dome/Normal)':'')+(cp.ability==='zeus'?' \u2014 Click worker to self-build':''),
    extrabuild:pre+cp.name+(cp.ability==='demeter'?' [Demeter]':' [Hephaestus]')+' \u2014 Build Again, or Skip',
    removebld:pre+cp.name+' [Ares] \u2014 Remove a Block, or Skip',
  };
  setSt(m[phase]||'');
}

/* ===== CLICK HANDLER ===== */
function click(r,c){
  if(gameOver)return;
  if(!isMyTurn())return;
  var cp=players[turnIdx];
  if(phase==='place'){if(grid[r][c].worker)return;var wi=cp.workers.findIndex(function(w){return !w.pos;});if(wi<0)return;placeW(cp,wi,r,c);return;}
  if(phase==='sel'){
    var wo=grid[r][c].worker;if(!wo||wo.p!==cp)return;
    var mvs=getMvs(cp,r,c);if(!mvs.length){setSt('That worker is trapped \u2014 try the other');return;}
    selWI=wo.wi;hlMv=mvs;hermesFlat=false;phase='move';renderAll();if(onlineMode)pushState();return;
  }
  if(phase==='move'||phase==='extramove'){
    if(!hlMv.some(function(h){return h[0]===r&&h[1]===c;}))return;
    var w=cp.workers[selWI],fr=w.pos[0],fc=w.pos[1];
    var fromLv=grid[fr][fc].level,toLv=grid[r][c].level;
    if(checkWin(cp,fr,fc,r,c)){doMv(cp,selWI,fr,fc,r,c);endGame(cp);return;}
    if(phase==='move'&&cp.ability==='artemis')artStart=[fr,fc];
    doMv(cp,selWI,fr,fc,r,c);hlMv=[];
    if((phase==='move'||phase==='extramove')&&cp.ability==='hermes'){
      if(toLv===fromLv){hermesFlat=true;var hm=getMvs(cp,r,c);if(hm.length){hlMv=hm;phase='extramove';renderAll();if(onlineMode)pushState();return;}}
      startBuild(r,c);return;
    }
    if((phase==='move'||phase==='extramove')&&cp.ability==='triton'){
      if(isPerimeter(r,c)){var tm=getMvs(cp,r,c);if(tm.length){hlMv=tm;phase='extramove';renderAll();if(onlineMode)pushState();return;}}
      startBuild(r,c);return;
    }
    if(phase==='move'&&cp.ability==='artemis'){
      var exM=getMvs(cp,r,c).filter(function(h){return !(h[0]===artStart[0]&&h[1]===artStart[1]);});
      if(exM.length){hlMv=exM;phase='extramove';renderAll();if(onlineMode)pushState();return;}
    }
    startBuild(r,c);return;
  }
  if(phase==='build'){
    var isSelf=(r===cp.workers[selWI].pos[0]&&c===cp.workers[selWI].pos[1]);
    if(!hlBd.some(function(h){return h[0]===r&&h[1]===c;}))return;
    if(isSelf&&cp.ability==='zeus'){grid[r][c].level++;}else doBd(r,c);
    if(checkChronus(cp)){endGame(cp);return;}
    demFirst=[r,c];hlBd=[];
    if(cp.ability==='demeter'&&!isSelf){var ww=cp.workers[selWI],exB=getBds(cp,ww.pos[0],ww.pos[1],demFirst).filter(function(n){return !(n[0]===ww.pos[0]&&n[1]===ww.pos[1]);});if(exB.length){hlBd=exB;phase='extrabuild';renderAll();if(onlineMode)pushState();return;}}
    if(cp.ability==='hephaestus'&&!isSelf&&!grid[r][c].dome&&grid[r][c].level<3){hlBd=[[r,c]];phase='extrabuild';renderAll();if(onlineMode)pushState();return;}
    if(cp.ability==='ares'){var w2=cp.workers[selWI],rmT=nb(w2.pos[0],w2.pos[1]).filter(function(n){var t=grid[n[0]][n[1]];return !t.worker&&!t.dome&&t.level>0;});if(rmT.length){hlBd=rmT;phase='removebld';renderAll();if(onlineMode)pushState();return;}}
    finishTurn();return;
  }
  if(phase==='extrabuild'){
    if(!hlBd.some(function(h){return h[0]===r&&h[1]===c;}))return;
    if(cp.ability==='hephaestus'){if(!grid[r][c].dome&&grid[r][c].level<3)grid[r][c].level++;}else doBd(r,c);
    if(checkChronus(cp)){endGame(cp);return;}
    hlBd=[];
    if(cp.ability==='ares'){var w3=cp.workers[selWI],rmT2=nb(w3.pos[0],w3.pos[1]).filter(function(n){var t=grid[n[0]][n[1]];return !t.worker&&!t.dome&&t.level>0;});if(rmT2.length){hlBd=rmT2;phase='removebld';renderAll();if(onlineMode)pushState();return;}}
    finishTurn();return;
  }
  if(phase==='removebld'){
    if(!hlBd.some(function(h){return h[0]===r&&h[1]===c;}))return;
    grid[r][c].level--;hlBd=[];finishTurn();return;
  }
}
function startBuild(r,c){var bds=getBds(players[turnIdx],r,c,null);if(!bds.length){finishTurn();return;}hlBd=bds;atlasDome=false;phase='build';renderAll();if(onlineMode)pushState();}
function skipExtraMove(){var w=players[turnIdx].workers[selWI];hlMv=[];startBuild(w.pos[0],w.pos[1]);}
/* finishTurn: called after all actions for a human turn are complete */
function finishTurn(){renderAll();if(onlineMode)pushState();advTurn();}

function placeW(cp,wi,r,c){
  grid[r][c].worker={p:cp,wi:wi};cp.workers[wi].pos=[r,c];draftStep++;
  var allDone=players.every(function(p){return p.workers.every(function(w){return w.pos;});});
  if(allDone||draftStep>=draftOrder.length){
    phase='sel';turnIdx=0;selWI=null;hlMv=[];hlBd=[];
    renderAll();if(onlineMode)pushState();
    if(!onlineMode&&!players[0].isHuman)setTimeout(cpuTurn,600);
    if(onlineMode&&isHost&&!players[0].isHuman)setTimeout(cpuTurn,600);
    return;
  }
  turnIdx=draftOrder[draftStep];renderAll();if(onlineMode)pushState();
  if(!onlineMode&&!players[turnIdx].isHuman)setTimeout(cpuPlace,400);
  if(onlineMode&&isHost&&!players[turnIdx].isHuman)setTimeout(cpuPlace,400);
}
function advTurn(){
  hlMv=[];hlBd=[];selWI=null;atlasDome=false;artStart=null;demFirst=null;hermesFlat=false;
  turnIdx=(turnIdx+1)%players.length;var cp=players[turnIdx];
  var hasMv=cp.workers.some(function(w){return w.pos&&getMvs(cp,w.pos[0],w.pos[1]).length>0;});
  if(!hasMv){
    if(players.length===2){endGame(players[1-turnIdx]);return;}
    var nm=cp.name;cp.workers.forEach(function(w){if(w.pos){grid[w.pos[0]][w.pos[1]].worker=null;w.pos=null;}});
    players.splice(turnIdx,1);
    if(players.length===1){endGame(players[0]);return;}
    if(useTeams){for(var t=0;t<2;t++){if(!players.some(function(p){return p.team===t;})){endGame(players.find(function(p){return p.team===1-t;}));return;}}}
    turnIdx=turnIdx%players.length;setSt(nm+' has been eliminated!');
    if(onlineMode)pushState();
    setTimeout(function(){phase='sel';renderAll();
      if(!onlineMode&&!players[turnIdx].isHuman)setTimeout(cpuTurn,600);
      if(onlineMode&&isHost&&!players[turnIdx].isHuman)setTimeout(cpuTurn,600);
    },900);return;
  }
  phase='sel';renderAll();
  if(onlineMode)pushState();
  if(!onlineMode&&!cp.isHuman){if(phase==='place')setTimeout(cpuPlace,600);else setTimeout(cpuTurn,600);}
  if(onlineMode&&isHost&&!cp.isHuman){if(phase==='place')setTimeout(cpuPlace,600);else setTimeout(cpuTurn,600);}
}
function endGame(winner){
  gameOver=true;phase='gameover';
  var msg=useTeams
    ?'Team '+(winner.team===0?'I':'II')+' is victorious! ('+players.filter(function(p){return p.team===winner.team;}).map(function(p){return p.name;}).join(' & ')+')'
    :winner.name+' is victorious!';
  setSt(msg);renderAll();if(onlineMode)pushState();
}

/* ===== AI ===== */
function opponentWinThreats(p){
  var threats=[];
  players.filter(function(q){return q!==p;}).forEach(function(op){op.workers.forEach(function(w){if(!w.pos)return;getMvs(op,w.pos[0],w.pos[1]).forEach(function(m){if(checkWin(op,w.pos[0],w.pos[1],m[0],m[1])&&!threats.some(function(t){return t[0]===m[0]&&t[1]===m[1];}))threats.push(m);});});});
  return threats;
}
function evalBoard(p){
  var score=0;
  players.forEach(function(q){var sign=(q===p)?1:-1;q.workers.forEach(function(w){if(!w.pos)return;var lv=grid[w.pos[0]][w.pos[1]].level;score+=sign*lv*20;getMvs(q,w.pos[0],w.pos[1]).forEach(function(m){if(checkWin(q,w.pos[0],w.pos[1],m[0],m[1]))score+=sign*300;});score+=sign*getMvs(q,w.pos[0],w.pos[1]).length*4;var a2=nb(w.pos[0],w.pos[1]).filter(function(n){return grid[n[0]][n[1]].level===2&&!grid[n[0]][n[1]].dome;});score+=sign*a2.length*8;});});
  return score;
}
function scoreMv(p,wi,mr,mc){
  var w=p.workers[wi];var fr=w.pos[0],fc=w.pos[1];var fl=grid[fr][fc].level,tl=grid[mr][mc].level;
  if(checkWin(p,fr,fc,mr,mc))return 9999;
  var threats=opponentWinThreats(p);
  var sc=tl*18+(tl>fl?20:0)+(tl===2?15:0);
  if(threats.some(function(t){return t[0]===mr&&t[1]===mc;}))sc+=200;
  var bsc=-Infinity;
  getBds(p,mr,mc,null).forEach(function(b){if(b[0]===mr&&b[1]===mc)return;var bl=grid[b[0]][b[1]].level,bs=0;if(threats.some(function(t){return t[0]===b[0]&&t[1]===b[1];}))bs+=250;if(bl===2&&tl>=2)bs+=60;var gw=false;players.filter(function(q){return q!==p;}).forEach(function(op){op.workers.forEach(function(ow){if(!ow.pos)return;var ol=grid[ow.pos[0]][ow.pos[1]].level;var d=Math.max(Math.abs(b[0]-ow.pos[0]),Math.abs(b[1]-ow.pos[1]));if(d<=1&&ol>=2&&bl===2)gw=true;if(d<=1&&bl===3)bs+=12;});});if(gw)bs-=200;bs+=bl*6;if(bs>bsc)bsc=bs;});
  sc+=Math.max(0,bsc)*0.6;sc+=getMvs(p,mr,mc).length*5;
  if(diff==='hard'){var sw=grid[mr][mc].worker;grid[fr][fc].worker=null;grid[mr][mc].worker={p:p,wi:wi};p.workers[wi].pos=[mr,mc];sc+=evalBoard(p)*0.3;grid[mr][mc].worker=sw;grid[fr][fc].worker={p:p,wi:wi};p.workers[wi].pos=[fr,fc];}
  sc+=(diff==='medium'?Math.random()*6:Math.random()*2);return sc;
}
function scoreBd(p,wr,wc,br,bc){
  if(diff==='easy')return Math.random()*10;
  var bl=grid[br][bc].level,sc=0,threats=opponentWinThreats(p);
  if(threats.some(function(t){return t[0]===br&&t[1]===bc;}))sc+=300;
  if(bl===2&&grid[wr][wc].level>=2)sc+=80;
  var gw=false;players.filter(function(q){return q!==p;}).forEach(function(op){op.workers.forEach(function(ow){if(!ow.pos)return;var ol=grid[ow.pos[0]][ow.pos[1]].level;var d=Math.max(Math.abs(br-ow.pos[0]),Math.abs(bc-ow.pos[1]));if(d<=1&&ol>=2&&bl===2)gw=true;});});
  if(gw)sc-=200;sc+=bl*8;sc+=Math.random()*3;return sc;
}
function cpuPlace(){
  if(onlineMode&&!isHost)return;
  var cp=players[turnIdx];if(cp.isHuman)return;
  var empties=[];for(var r=0;r<SZ;r++)for(var c=0;c<SZ;c++)if(!grid[r][c].worker)empties.push([r,c]);
  var pos;
  if(diff==='easy'){pos=empties[Math.floor(Math.random()*empties.length)];}
  else{pos=empties.slice().sort(function(a,b){var sc=function(x){var s=(x[0]>0&&x[0]<4&&x[1]>0&&x[1]<4)?4:0;s+=(x[0]>1&&x[0]<3&&x[1]>1&&x[1]<3)?2:0;if(diff==='hard'){players.forEach(function(op){op.workers.forEach(function(ow){if(!ow.pos)return;var d=Math.max(Math.abs(x[0]-ow.pos[0]),Math.abs(x[1]-ow.pos[1]));s+=Math.max(0,4-d)*1.5;});});}return s+Math.random()*2;};return sc(b)-sc(a);})[0];}
  var wi=cp.workers.findIndex(function(w){return !w.pos;});placeW(cp,wi,pos[0],pos[1]);
}
function cpuTurn(){
  if(onlineMode&&!isHost)return;
  if(gameOver)return;var cp=players[turnIdx];if(cp.isHuman)return;
  if(diff==='easy'){cpuEasy(cp);return;}
  var best=null,bSc=-Infinity;
  cp.workers.forEach(function(w,wi){if(!w.pos)return;getMvs(cp,w.pos[0],w.pos[1]).forEach(function(m){var s=scoreMv(cp,wi,m[0],m[1]);if(s>bSc){bSc=s;best={wi:wi,mr:m[0],mc:m[1]};}});});
  if(!best){cpuAdvTurn();return;}
  var w=cp.workers[best.wi],fr=w.pos[0],fc=w.pos[1],fl=grid[fr][fc].level;
  if(checkWin(cp,fr,fc,best.mr,best.mc)){doMv(cp,best.wi,fr,fc,best.mr,best.mc);endGame(cp);return;}
  doMv(cp,best.wi,fr,fc,best.mr,best.mc);
  if(cp.ability==='artemis'){var exM=getMvs(cp,best.mr,best.mc).filter(function(h){return !(h[0]===fr&&h[1]===fc);});if(exM.length){var em=null,emS=-Infinity;exM.forEach(function(m){var s=scoreMv(cp,best.wi,m[0],m[1]);if(s>emS){emS=s;em=m;}});if(em&&emS>bSc+5){if(checkWin(cp,best.mr,best.mc,em[0],em[1])){doMv(cp,best.wi,best.mr,best.mc,em[0],em[1]);endGame(cp);return;}doMv(cp,best.wi,best.mr,best.mc,em[0],em[1]);best.mr=em[0];best.mc=em[1];}}}
  if(cp.ability==='hermes'&&grid[best.mr][best.mc].level===fl){var seen=[[fr,fc]];for(var hi=0;hi<5;hi++){var cur=cp.workers[best.wi].pos;var hm=getMvs(cp,cur[0],cur[1]).filter(function(h){return !seen.some(function(s){return s[0]===h[0]&&s[1]===h[1];})&&grid[h[0]][h[1]].level===grid[cur[0]][cur[1]].level;});if(!hm.length)break;var hb=null,hbs=-Infinity;hm.forEach(function(m){var s=scoreMv(cp,best.wi,m[0],m[1]);if(s>hbs){hbs=s;hb=m;}});if(hb&&hbs>bSc+8){seen.push([cur[0],cur[1]]);doMv(cp,best.wi,cur[0],cur[1],hb[0],hb[1]);best.mr=hb[0];best.mc=hb[1];}else break;}}
  if(cp.ability==='triton'){for(var ti=0;ti<4;ti++){var tc=cp.workers[best.wi].pos;if(!isPerimeter(tc[0],tc[1]))break;var tm=getMvs(cp,tc[0],tc[1]);if(!tm.length)break;var tb=null,tbs=-Infinity;tm.forEach(function(m){var s=scoreMv(cp,best.wi,m[0],m[1]);if(s>tbs){tbs=s;tb=m;}});if(tb&&tbs>bSc+5){doMv(cp,best.wi,tc[0],tc[1],tb[0],tb[1]);best.mr=tb[0];best.mc=tb[1];}else break;}}
  var bds=getBds(cp,best.mr,best.mc,null).filter(function(b){return !(b[0]===best.mr&&b[1]===best.mc);});
  if(bds.length){
    var bd=bds.reduce(function(a,b){return scoreBd(cp,best.mr,best.mc,b[0],b[1])>scoreBd(cp,best.mr,best.mc,a[0],a[1])?b:a;});
    var selfOk=cp.ability==='zeus'&&grid[best.mr][best.mc].level<3;
    var selfSc=selfOk?(grid[best.mr][best.mc].level+1)*15+(diff==='hard'?20:10):-Infinity;
    if(selfOk&&selfSc>scoreBd(cp,best.mr,best.mc,bd[0],bd[1])){grid[best.mr][best.mc].level++;}
    else{
      if(cp.ability==='atlas'){var th=opponentWinThreats(cp);var sd=grid[bd[0]][bd[1]].level===3||th.some(function(t){return t[0]===bd[0]&&t[1]===bd[1];});if(diff==='hard'&&!sd){players.filter(function(q){return q!==cp;}).forEach(function(op){op.workers.forEach(function(ow){if(!ow.pos)return;var d=Math.max(Math.abs(bd[0]-ow.pos[0]),Math.abs(bd[1]-ow.pos[1]));if(d<=1&&grid[ow.pos[0]][ow.pos[1]].level>=1&&grid[bd[0]][bd[1]].level>=2)sd=true;});});}if(sd){grid[bd[0]][bd[1]].dome=true;}else{doBd(bd[0],bd[1]);}}else{doBd(bd[0],bd[1]);}
      if(checkChronus(cp)){endGame(cp);return;}
      if(cp.ability==='demeter'){var exBd=getBds(cp,best.mr,best.mc,bd).filter(function(b){return !(b[0]===best.mr&&b[1]===best.mc);});if(exBd.length){var eb=exBd.reduce(function(a,b){return scoreBd(cp,best.mr,best.mc,b[0],b[1])>scoreBd(cp,best.mr,best.mc,a[0],a[1])?b:a;});doBd(eb[0],eb[1]);if(checkChronus(cp)){endGame(cp);return;}}}
      if(cp.ability==='hephaestus'&&!grid[bd[0]][bd[1]].dome&&grid[bd[0]][bd[1]].level<3){grid[bd[0]][bd[1]].level++;if(checkChronus(cp)){endGame(cp);return;}}
      if(cp.ability==='ares'){var rmTs=nb(best.mr,best.mc).filter(function(n){var t=grid[n[0]][n[1]];return !t.worker&&!t.dome&&t.level>0;});if(rmTs.length){var br2=rmTs.reduce(function(a,b){return grid[b[0]][b[1]].level>grid[a[0]][a[1]].level?b:a;});grid[br2[0]][br2[1]].level--;}}
    }
  }
  cpuAdvTurn();
}
function cpuEasy(cp){
  var moves=[];cp.workers.forEach(function(w,wi){if(!w.pos)return;getMvs(cp,w.pos[0],w.pos[1]).forEach(function(m){moves.push({wi:wi,mr:m[0],mc:m[1]});});});
  if(!moves.length){cpuAdvTurn();return;}
  var win=moves.find(function(mv){var w=cp.workers[mv.wi];return checkWin(cp,w.pos[0],w.pos[1],mv.mr,mv.mc);});
  var mv=win||moves[Math.floor(Math.random()*moves.length)];
  var w=cp.workers[mv.wi],fr=w.pos[0],fc=w.pos[1];
  if(checkWin(cp,fr,fc,mv.mr,mv.mc)){doMv(cp,mv.wi,fr,fc,mv.mr,mv.mc);endGame(cp);return;}
  doMv(cp,mv.wi,fr,fc,mv.mr,mv.mc);
  var bds=getBds(cp,mv.mr,mv.mc,null).filter(function(b){return !(b[0]===mv.mr&&b[1]===mv.mc);});
  if(bds.length){var bd=bds[Math.floor(Math.random()*bds.length)];doBd(bd[0],bd[1]);}
  cpuAdvTurn();
}
/* CPU version of advTurn: renders + pushes then calls advTurn after delay */
function cpuAdvTurn(){
  renderAll();
  if(onlineMode)pushState();
  setTimeout(advTurn,400);
}

showSetup();
